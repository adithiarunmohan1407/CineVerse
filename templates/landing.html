<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVerse AI</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1600&q=80");
            background-size:cover;
            background-position:center;
            height:100vh;
            color:white;

        }

        .overlay{

            background:rgba(0,0,0,.75);
            width:100%;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

        }

        .content{

            text-align:center;
            width:80%;

        }

        h1{

            font-size:70px;
            color:#ff4040;
            margin-bottom:20px;

        }

        p{

            font-size:22px;
            line-height:1.8;
            margin-bottom:40px;

        }

        .btn{

            text-decoration:none;
            color:white;
            background:#e50914;
            padding:15px 40px;
            margin:10px;
            border-radius:8px;
            font-size:20px;

        }

        .btn:hover{

            background:#b20710;

        }

    </style>

</head>

<body>

<div class="overlay">

<div class="content">

<h1>🎬 CineVerse AI</h1>

<p>

Discover thousands of English, Hindi, Malayalam, Tamil and Telugu movies with AI-powered recommendations.

</p>

<a href="{% url 'login' %}" class="btn">Login</a>

<a href="{% url 'register' %}" class="btn">Register</a>

</div>

</div>

</body>

</html>
