{% extends "base.html" %}

{% block content %}

<h1>❤️ My Wishlist</h1>

{% if movies %}

<div class="movie-container">

{% for movie in movies %}

<div class="movie-card">

<img src="{{ movie.poster }}" width="200">

<h3>{{ movie.title }}</h3>

<p>⭐ {{ movie.imdb_rating }}</p>

<a href="{% url 'remove_from_wishlist' movie.id %}">
    Remove
</a>

</div>

{% endfor %}

</div>

{% else %}

<h2>Your wishlist is empty.</h2>

{% endif %}

{% endblock %}
